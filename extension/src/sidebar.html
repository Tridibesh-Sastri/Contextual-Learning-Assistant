<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning Assistant</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="title">Learning Assistant</div>
        <div class="subtitle">Ask about this page</div>
      </header>

      <main class="chat" id="chat"></main>

      <section class="controls">
        <div class="modes">
          <button class="mode active" data-mode="explain">Explain</button>
          <button class="mode" data-mode="deep">Deep Dive</button>
          <button class="mode" data-mode="code">Code Mode</button>
        </div>
        <div class="input-row">
          <textarea id="question" rows="2" placeholder="Ask a doubt, request an example, or explain a concept..."></textarea>
          <button id="send">Send</button>
        </div>
        <div class="status" id="status"></div>
      </section>
    </div>

    <script src="sidebar.js"></script>
  </body>
</html>
